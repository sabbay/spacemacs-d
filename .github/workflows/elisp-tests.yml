name: elisp-tests

on:
  push:
    branches: [main]
    paths:
      - 'lisp/claude-collab*.el'
      - 'Eldev'
      - '.github/workflows/elisp-tests.yml'
  pull_request:
    paths:
      - 'lisp/claude-collab*.el'
      - 'Eldev'
      - '.github/workflows/elisp-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '29.4'
          - '30.1'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4

      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - uses: emacs-eldev/setup-eldev@v1

      - name: Byte-compile core (strict — warnings as errors)
        # Pure core has no external runtime deps and must stay clean.
        # Adapter `claude-collab.el' references org-mode / evil / posframe /
        # mcp-server-* which aren't installed in CI; gating the matrix on
        # those would mean stuffing the Emacs config into Eldev, which
        # is overkill. So core gates strictly, adapter gets a soft pass.
        run: eldev -p compile lisp/claude-collab-core.el --warnings-as-errors

      - name: Byte-compile adapter (soft)
        run: eldev -p compile lisp/claude-collab.el || true

      - name: Lint core
        # Same rationale as compile — core is the lint contract.
        run: eldev lint lisp/claude-collab-core.el

      - name: Run ERT suite
        # Adapter integration tests (those that hit `mcp-server-security-safe-eval')
        # `(ert-skip)' themselves when the local emacs-mcp-server checkout isn't
        # available — leaving the pure core suite to gate the matrix.
        run: eldev test
